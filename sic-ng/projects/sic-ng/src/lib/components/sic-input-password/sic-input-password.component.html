<label class="sic-field">
  @if (label) {
    <span class="sic-field__label">
      {{ label }}
      @if (isRequired) {
        <span class="sic-field__required">*</span>
      }
    </span>
  }

  <span class="sic-input-password__wrap">
    <input
      class="sic-input-password__field"
      [class.sic-input-password__field--invalid]="showError"
      [type]="revealed ? 'text' : 'password'"
      [name]="name"
      [placeholder]="placeholder"
      [autocomplete]="autocomplete"
      [readOnly]="readonly"
      [disabled]="disabled"
      [value]="value"
      (input)="handleInput($event)"
      (blur)="handleBlur()"
    />
    <button
      type="button"
      class="sic-input-password__toggle"
      [disabled]="disabled"
      (click)="toggleReveal()"
      [attr.aria-label]="revealed ? 'Hide password' : 'Show password'"
    >
      {{ revealed ? 'Hide' : 'Show' }}
    </button>
  </span>

  @if (showError && errorMessage) {
    <span class="sic-field__error">{{ errorMessage }}</span>
  } @else if (hint) {
    <span class="sic-field__hint">{{ hint }}</span>
  }
</label>

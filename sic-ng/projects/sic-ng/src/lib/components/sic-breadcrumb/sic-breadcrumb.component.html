<nav class="sic-breadcrumb" aria-label="Breadcrumb">
  @for (item of items; track item.label; let last = $last) {
    <span class="sic-breadcrumb__item">
      @if (item.link && !last) {
        <a class="sic-breadcrumb__link" (click)="itemClick.emit(item)">{{ item.label }}</a>
      } @else {
        <span class="sic-breadcrumb__current">{{ item.label }}</span>
      }
    </span>
    @if (!last) {
      <span class="sic-breadcrumb__separator">{{ separator }}</span>
    }
  }
</nav>

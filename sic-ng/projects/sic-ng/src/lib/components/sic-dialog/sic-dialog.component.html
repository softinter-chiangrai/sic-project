@if (open) {
  <div class="sic-dialog__backdrop" (click)="handleBackdropClick()">
    <div class="sic-dialog__panel" [style.width]="width" (click)="$event.stopPropagation()">
      <div class="sic-dialog__header">
        @if (title) {
          <h3 class="sic-dialog__title">{{ title }}</h3>
        }
        <button type="button" class="sic-dialog__close" (click)="close()" aria-label="Close dialog">✕</button>
      </div>
      <div class="sic-dialog__body">
        <ng-content></ng-content>
      </div>
      <div class="sic-dialog__footer">
        <ng-content select="[sicDialogFooter]"></ng-content>
      </div>
    </div>
  </div>
}

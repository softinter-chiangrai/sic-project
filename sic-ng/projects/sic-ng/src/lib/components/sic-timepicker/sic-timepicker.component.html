<label class="sic-field">
  @if (label) {
    <span class="sic-field__label">
      {{ label }}
      @if (isRequired) {
        <span class="sic-field__required">*</span>
      }
    </span>
  }

  <input
    type="time"
    class="sic-control-field"
    [class.sic-control-field--invalid]="showError"
    [min]="min ?? null"
    [max]="max ?? null"
    [step]="step ?? null"
    [readOnly]="readonly"
    [disabled]="disabled"
    [value]="value"
    (input)="handleInput($event)"
    (blur)="handleBlur()"
  />

  @if (showError && errorMessage) {
    <span class="sic-field__error">{{ errorMessage }}</span>
  } @else if (hint) {
    <span class="sic-field__hint">{{ hint }}</span>
  }
</label>

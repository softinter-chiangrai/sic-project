<label class="sic-field">
  @if (label) {
    <span class="sic-field__label">
      {{ label }}
      @if (isRequired) {
        <span class="sic-field__required">*</span>
      }
    </span>
  }

  <input
    class="sic-input__field"
    [class.sic-input__field--invalid]="showError"
    [type]="type"
    [name]="name"
    [placeholder]="placeholder"
    [autocomplete]="autocomplete"
    [attr.maxlength]="maxlength ?? null"
    [readOnly]="readonly"
    [disabled]="disabled"
    [value]="value"
    (input)="handleInput($event)"
    (blur)="handleBlur()"
  />

  @if (showError && errorMessage) {
    <span class="sic-field__error">{{ errorMessage }}</span>
  } @else if (hint) {
    <span class="sic-field__hint">{{ hint }}</span>
  }
</label>

spring:
  datasource:
    url: jdbc:postgresql://localhost:54320/sic_app
    username: sic-app
    password: SicApp2026
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update # ค่า options: none, validate, update, create, create-drop
    show-sql: true # แสดง SQL ที่ถูกสร้าง (ควรปิดใน production)
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true # จัดรูปแบบ SQL ให้อ่านง่าย (คู่กับ show-sql)
        jdbc:
          batch_size: 20 # ปรับ batch size ตามเหมาะสม
    open-in-view: false # ปิด Open Session in View เพื่อประสิทธิภาพ

  web:
    cors:
      allowed-origins:
        - http://localhost:4200

keycloak:
  realm: sic-project
  auth-server-url: http://localhost:8080/
  ssl-required: none
  resource: sic-app
  verify-token-audience: false
  credentials:
    secret: ""
  confidential-port: 0

storage:
  service-url: http://localhost:8888
  access-key: seaweedfs
  secret-key: seaweedfs-secret
  image-bucket: public-files
  video-bucket: public-files
  document-bucket: documents

logging:
  level:
    root: INFO
    org.springframework.web: WARN

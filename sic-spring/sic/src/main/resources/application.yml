logging:
  pattern:
    console: "%msg%n"
  level:
    root: ERROR
    com.softinter.sicapi: DEBUG
    org.springframework.mail: DEBUG
    com.softinter.sicapi.service.impl: DEBUG
    software.amazon.awssdk: DEBUG   # เพิ่มบรรทัดนี้
    org.springframework.security: DEBUG   # เพิ่มบรรทัดนี้

spring.main.banner-mode: off
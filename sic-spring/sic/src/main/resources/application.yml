server:
  port: 5265

spring:
  datasource:
    url: jdbc:postgresql://localhost:54320/sic_app
    username: sic-app
    password: SicApp2026
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          batch_size: 20
    open-in-view: false

  web:
    cors:
      allowed-origins:
        - http://localhost:4200

  mail:
    host: smtp.gmail.com
    port: 587
    username: phurinsukman3@gmail.com
    password: qeivnricakfexxzh
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

app:
  keycloak:
    realm: sic-project
    auth-server-url: http://localhost:8080
    ssl-required: none
    resource: sic-app
    verify-token-audience: false
    credentials:
      secret: ""
    confidential-port: 0

  # ✅ แก้ไขส่วน storage ให้ถูกต้อง
  storage:
    s3:
      bucket: public-files          # bucket หลัก (รูป/วิดีโอ)
      document-bucket: documents    # bucket สำหรับเอกสาร (ตาม .NET)
      region: us-east-1             # region ใดก็ได้สำหรับ local
      access-key: seaweedfs
      secret-key: seaweedfs-secret
      endpoint: http://localhost:8888      # สำคัญที่สุด!
      path-style-access-enabled: true      # จำเป็นสำหรับ S3-compatible

# ❌ ลบ section storage ซ้ำซ้อนนี้ทิ้ง (หรือ comment ไว้)

server:
  port: 5265

spring:
  datasource:
    url: jdbc:postgresql://localhost:54320/sic_app # ✅ ใช้ชื่อ DB ที่คุณมีอยู่
    username: sic-app # ✅ ใช้ user ที่คุณมี
    password: SicApp2026
    driver-class-name: org.postgresql.Driver

  # ===== ✅ เพิ่ม Flyway Configuration =====
  flyway:
    enabled: true
    baseline-on-migrate: true # ✅ บอก Flyway ว่า DB มี Schema อยู่แล้ว
    baseline-version: "1" # ✅ กำหนด Baseline Version
    validate-on-migrate: false # ✅ ข้ามการ Validate (เพราะ schema มาจาก .NET)
    locations: classpath:db/migration # ✅ โฟลเดอร์ที่เก็บไฟล์ SQL
    schemas: public # ✅ Schema ที่ใช้
    table: flyway_schema_history # ✅ ชื่อตาราง History (ค่าเริ่มต้น)

  jpa:
    hibernate:
      ddl-auto: none # ✅ ถูกต้องแล้ว (ไม่ให้ Hibernate แก้ไข Schema)
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
        jdbc:
          batch_size: 20
    open-in-view: false

  web:
    cors:
      allowed-origins:
        - http://localhost:4200

  mail:
    host: smtp.gmail.com
    port: 587
    username: phurinsukman3@gmail.com
    password: qeivnricakfexxzh
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

app:
  keycloak:
    realm: sic-project
    auth-server-url: http://localhost:8080
    ssl-required: none
    resource: sic-app
    verify-token-audience: false
    credentials:
      secret: ""
    confidential-port: 0

  storage:
    s3:
      bucket: public-files
      document-bucket: documents
      region: us-east-1
      access-key: seaweedfs
      secret-key: seaweedfs-secret
      endpoint: http://localhost:8888
      path-style-access-enabled: true

logging:
  pattern:
    console: "%msg%n"
  level:
    root: ERROR
    com.softinter.sicapi: DEBUG
    org.springframework.mail: DEBUG
    com.softinter.sicapi.service.impl: ERROR
    org.springframework.security: DEBUG
    org.flywaydb: DEBUG 

spring.main.banner-mode: off

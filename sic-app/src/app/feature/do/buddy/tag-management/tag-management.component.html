<div class="mgmt-page">
  <div class="mgmt-header">
    <h2>Tags</h2>
  </div>

  <!-- Create Form -->
  <div class="create-card">
    <h3 class="create-title">New Tag</h3>
    <div class="create-form">
      <input class="form-input" [(ngModel)]="newName" placeholder="Tag name *" />
      <input class="form-input" [(ngModel)]="newDescription" placeholder="Description (optional)" />
      <div class="color-row">
        <label class="color-label">Color:</label>
        <input type="color" [(ngModel)]="newColor" class="color-picker" />
        <span class="color-preview" [style.background]="newColor"></span>
      </div>
      <button class="create-btn" (click)="create()" [disabled]="!newName.trim() || isCreating">
        {{ isCreating ? 'Creating...' : '+ Create' }}
      </button>
    </div>
    <div class="create-error" *ngIf="createError">{{ createError }}</div>
  </div>

  <div class="loading-state" *ngIf="isLoading">Loading...</div>
  <div class="empty-state" *ngIf="!isLoading && items.length === 0">
    <div class="empty-icon">🔖</div>
    <p>No tags yet. Create your first one above!</p>
  </div>

  <!-- Items List -->
  <div class="items-list" *ngIf="!isLoading && items.length > 0">
    <div class="item-row" *ngFor="let item of items">
      <ng-container *ngIf="editingId !== item.id; else editRow">
        <span class="item-dot" [style.background]="item.color_code"></span>
        <span class="item-name">{{ item.name }}</span>
        <span class="item-desc">{{ item.description }}</span>
        <div class="item-actions">
          <button class="edit-btn" (click)="startEdit(item)">Edit</button>
          <button class="delete-btn" (click)="delete(item)">Delete</button>
        </div>
      </ng-container>
      <ng-template #editRow>
        <input class="form-input edit-input" [(ngModel)]="editName" placeholder="Name *" />
        <input class="form-input edit-input" [(ngModel)]="editDescription" placeholder="Description" />
        <input type="color" [(ngModel)]="editColor" class="color-picker" />
        <div class="item-actions">
          <button class="save-btn" (click)="saveEdit(item)">Save</button>
          <button class="cancel-btn" (click)="cancelEdit()">Cancel</button>
        </div>
      </ng-template>
    </div>
  </div>
</div>

<div class="pmdt06-wrapper">
  <!-- Toolbar -->
  <div class="toolbar">
    <div class="ai-section">
      <textarea
        [(ngModel)]="aiPrompt"
        placeholder="Describe your diagram... (e.g., 'Create an e-commerce order flow')"
        rows="1"
        class="ai-input"
      >
      </textarea>
      <button (click)="generateDiagram()" [disabled]="isGenerating" class="btn-generate">
        {{ isGenerating ? '⏳ Generating...' : '✨ Generate with AI' }}
      </button>
    </div>
    <div class="actions">
      <button (click)="saveDiagram()" class="btn-save">💾 Save</button>
      <button (click)="loadExistingDiagram()" class="btn-load">🔄 Reload</button>
    </div>
  </div>

  <!-- Draw.io Editor -->
  <div class="editor-container">
    <iframe
      #drawioIframe
      src="https://embed.diagrams.net/?embed=1&proto=json&spin=1&configure=1"
      width="100%"
      height="100%"
      frameborder="0"
    >
    </iframe>
  </div>
</div>

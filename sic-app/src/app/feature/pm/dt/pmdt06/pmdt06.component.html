<div class="h-screen flex flex-col bg-[var(--bg)] text-[var(--text)]">
  <!-- Top Navbar -->
  <header class="flex items-center justify-between px-4 py-2 border-b border-[var(--border)] bg-[var(--sidebar)] flex-shrink-0">
    <div class="flex items-center gap-3">
      <button (click)="goBack()" class="p-1.5 rounded-lg hover:bg-[var(--sidebar-hover)] transition-colors">
        <i class="bi bi-arrow-left text-lg"></i>
      </button>
      <div class="flex items-center gap-2">
        <h1 class="text-lg font-bold text-[var(--crm-primary)]">AI Diagram Studio</h1>
        <span class="text-xs text-[var(--text-muted)]">v2.0</span>
      </div>
    </div>

    <div class="flex items-center gap-3">
      <!-- Project Selector -->
      <div class="flex items-center gap-2 px-3 py-1.5 rounded-lg border border-[var(--border)] text-sm bg-[var(--bg)]">
        <i class="bi bi-folder text-[var(--text-muted)]"></i>
        <span class="font-medium">{{ currentProject()?.name || 'Select Project' }}</span>
      </div>

      <!-- Theme Toggle -->
      <button (click)="toggleTheme()" class="p-2 rounded-lg hover:bg-[var(--sidebar-hover)] transition-colors" title="Toggle theme">
        <i class="bi text-lg" [class.bi-moon]="!isDark()" [class.bi-sun]="isDark()"></i>
      </button>
    </div>
  </header>

  <!-- Workspace -->
  <app-pmdt06A />
</div>

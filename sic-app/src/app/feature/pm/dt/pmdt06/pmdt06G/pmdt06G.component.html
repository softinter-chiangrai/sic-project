<div class="p-2 space-y-1">
  <div class="text-xs font-medium text-[var(--text-muted)] mb-2 px-1">Shapes</div>
  @for (shape of shapes(); track shape.name) {
    <div
      class="flex items-center gap-2 px-2 py-1.5 rounded cursor-grab hover:bg-[var(--sidebar-hover)] text-sm text-[var(--text-active)] transition-colors"
      draggable="true"
      (dragstart)="onDragStart($event, shape)"
      (click)="onShapeClick(shape)"
    >
      <i class="bi {{ shape.icon }} text-sm text-[var(--text-muted)]"></i>
      <span>{{ shape.name }}</span>
    </div>
  }
</div>

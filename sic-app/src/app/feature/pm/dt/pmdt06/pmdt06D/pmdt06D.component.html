<div class="h-full flex flex-col">
  <div class="flex items-center justify-between px-4 py-2 border-b border-[var(--border)] bg-[var(--sidebar)] flex-shrink-0">
    <h3 class="text-sm font-medium">Preview</h3>
    <div class="flex items-center gap-2">
      <button (click)="zoomIn()" class="p-1 rounded hover:bg-[var(--sidebar-hover)] transition-colors" title="Zoom In">
        <i class="bi bi-zoom-in"></i>
      </button>
      <button (click)="zoomOut()" class="p-1 rounded hover:bg-[var(--sidebar-hover)] transition-colors" title="Zoom Out">
        <i class="bi bi-zoom-out"></i>
      </button>
      <button (click)="resetZoom()" class="p-1 rounded hover:bg-[var(--sidebar-hover)] transition-colors" title="Reset Zoom">
        <i class="bi bi-arrow-counterclockwise"></i>
      </button>
      <button (click)="toggleFullscreen()" class="p-1 rounded hover:bg-[var(--sidebar-hover)] transition-colors" title="Fullscreen">
        <i class="bi bi-fullscreen"></i>
      </button>
    </div>
  </div>
  <div class="flex-1 overflow-auto p-4 bg-[var(--bg)]" style="min-height:0;">
    <div #diagramContainer class="w-full h-full flex items-center justify-center"></div>
  </div>
  @if (error()) {
    <div class="p-2 text-sm text-[var(--crm-danger)] bg-red-50 border-t border-red-200">
      {{ error() }}
    </div>
  }
</div>

<div class="h-full flex flex-col bg-[var(--bg)]">
  <!-- Toolbar -->
  <div class="flex items-center justify-between px-2 py-1 border-b border-[var(--border)] bg-[var(--sidebar)] flex-shrink-0">
    <div class="flex items-center gap-1">
      <!-- File actions -->
      <button (click)="importMermaid()" class="p-1.5 rounded hover:bg-[var(--sidebar-hover)] text-[var(--text-muted)] hover:text-[var(--text-active)]" title="Import from Mermaid (overwrite current diagram)">
        <i class="bi bi-arrow-repeat text-sm"></i>
      </button>
      <button (click)="importMermaid()" class="p-1.5 rounded hover:bg-[var(--sidebar-hover)] text-[var(--text-muted)] hover:text-[var(--text-active)]" title="Import Mermaid">
        <i class="bi bi-file-text text-sm"></i>
      </button>
      <!-- Export dropdown -->
      <div class="relative" (mouseenter)="showExport.set(true)" (mouseleave)="showExport.set(false)">
        <button class="p-1.5 rounded hover:bg-[var(--sidebar-hover)] text-[var(--text-muted)] hover:text-[var(--text-active)]" title="Export">
          <i class="bi bi-download text-sm"></i>
        </button>
        @if (showExport()) {
          <div class="absolute top-full left-0 mt-1 bg-[var(--sidebar)] border border-[var(--border)] rounded-lg shadow-lg z-50 py-1 min-w-[120px]">
            <button (click)="exportPNG()" class="w-full text-left px-3 py-1.5 text-sm hover:bg-[var(--sidebar-hover)] text-[var(--text-active)]">PNG</button>
            <button (click)="exportSVG()" class="w-full text-left px-3 py-1.5 text-sm hover:bg-[var(--sidebar-hover)] text-[var(--text-active)]">SVG</button>
            <button (click)="exportPDF()" class="w-full text-left px-3 py-1.5 text-sm hover:bg-[var(--sidebar-hover)] text-[var(--text-active)]">PDF</button>
          </div>
        }
      </div>
      <span class="w-px h-5 bg-[var(--border)] mx-1"></span>
      <!-- Zoom -->
      <button (click)="zoomOut()" class="p-1.5 rounded hover:bg-[var(--sidebar-hover)] text-[var(--text-muted)] hover:text-[var(--text-active)]" title="Zoom Out">
        <i class="bi bi-zoom-out text-sm"></i>
      </button>
      <span class="text-xs text-[var(--text-muted)] min-w-[40px] text-center">{{ zoomLevel() }}%</span>
      <button (click)="zoomIn()" class="p-1.5 rounded hover:bg-[var(--sidebar-hover)] text-[var(--text-muted)] hover:text-[var(--text-active)]" title="Zoom In">
        <i class="bi bi-zoom-in text-sm"></i>
      </button>
      <button (click)="zoomToFit()" class="p-1.5 rounded hover:bg-[var(--sidebar-hover)] text-[var(--text-muted)] hover:text-[var(--text-active)]" title="Fit to Screen">
        <i class="bi bi-arrows-fullscreen text-sm"></i>
      </button>
      <span class="w-px h-5 bg-[var(--border)] mx-1"></span>
      <!-- Undo/Redo -->
      <button (click)="undo()" class="p-1.5 rounded hover:bg-[var(--sidebar-hover)] text-[var(--text-muted)] hover:text-[var(--text-active)]" title="Undo (Ctrl+Z)">
        <i class="bi bi-arrow-counterclockwise text-sm"></i>
      </button>
      <button (click)="redo()" class="p-1.5 rounded hover:bg-[var(--sidebar-hover)] text-[var(--text-muted)] hover:text-[var(--text-active)]" title="Redo (Ctrl+Y)">
        <i class="bi bi-arrow-clockwise text-sm"></i>
      </button>
      <span class="w-px h-5 bg-[var(--border)] mx-1"></span>
      <!-- Delete -->
      <button (click)="deleteSelected()" class="p-1.5 rounded hover:bg-[var(--sidebar-hover)] text-[var(--text-muted)] hover:text-[var(--text-active)]" title="Delete (Del)">
        <i class="bi bi-trash text-sm"></i>
      </button>
    </div>

    <!-- Edge style selector -->
    <div class="flex items-center gap-1">
      <span class="text-xs text-[var(--text-muted)] mr-1">Edge:</span>
      @for (style of edgeStyles; track style.value) {
        <button
          (click)="setEdgeStyle(style.value)"
          class="px-2 py-1 text-xs rounded transition-colors"
          [class.bg-[var(--crm-primary)]/20]="activeEdgeStyle() === style.value"
          [class.text-[var(--crm-primary)]]="activeEdgeStyle() === style.value"
          [class.text-[var(--text-muted)]]="activeEdgeStyle() !== style.value"
          [class.hover:bg-[var(--sidebar-hover)]]="true"
          [title]="style.label"
        >
          {{ style.label }}
        </button>
      }
    </div>
  </div>

  <!-- Canvas -->
  <div class="flex-1 min-h-0 relative">
    <!-- ✅ ข้อความแสดงเมื่อไม่มีข้อมูล -->
    @if (!graphData && !mermaidScript) {
      <div class="absolute inset-0 flex items-center justify-center text-[var(--text-muted)]">
        <div class="text-center">
          <i class="bi bi-diagram-3 text-4xl block mb-2 opacity-30"></i>
          <p>No diagram loaded</p>
          <p class="text-sm">Click <i class="bi bi-arrow-repeat"></i> to import from Mermaid</p>
        </div>
      </div>
    }
    <div #graphContainer class="absolute inset-0 overflow-hidden"></div>
  </div>
</div>

<!-- src/app/features/pmdt06/pmdt06B/pmdt06B.component.html -->
<div class="h-full flex flex-col bg-[var(--bg)]">
  <!-- Toolbar -->
  <div class="flex items-center justify-between px-4 py-1.5 border-b border-[var(--border)] bg-[var(--sidebar)] flex-shrink-0">
    <div class="flex items-center gap-3">
      <input
        [(ngModel)]="diagramName"
        (change)="onNameChange()"
        class="bg-transparent border-none outline-none text-sm font-medium text-[var(--text-active)]"
        placeholder="Diagram name"
      />
      <span class="text-xs text-[var(--text-muted)] px-2 py-0.5 rounded bg-[var(--bg)]">{{ diagramType }}</span>
      <span class="text-xs text-[var(--text-muted)]" *ngIf="isDirty()">● unsaved</span>
    </div>

    <div class="flex items-center gap-1">
      <button (click)="formatCode()" class="p-1.5 rounded hover:bg-[var(--sidebar-hover)] text-[var(--text-muted)] hover:text-[var(--text-active)] transition-colors" title="Format (trim spaces)">
        <i class="bi bi-braces text-sm"></i>
      </button>
      <button (click)="undo()" class="p-1.5 rounded hover:bg-[var(--sidebar-hover)] text-[var(--text-muted)] hover:text-[var(--text-active)] transition-colors" title="Undo (Ctrl+Z)">
        <i class="bi bi-arrow-counterclockwise text-sm"></i>
      </button>
      <button (click)="redo()" class="p-1.5 rounded hover:bg-[var(--sidebar-hover)] text-[var(--text-muted)] hover:text-[var(--text-active)] transition-colors" title="Redo (Ctrl+Y)">
        <i class="bi bi-arrow-clockwise text-sm"></i>
      </button>
      <span class="w-px h-5 bg-[var(--border)] mx-1"></span>
      <button (click)="saveDiagram()" class="p-1.5 rounded hover:bg-[var(--sidebar-hover)] text-[var(--text-muted)] hover:text-[var(--text-active)] transition-colors" title="Save (Ctrl+S)">
        <i class="bi bi-floppy text-sm"></i>
      </button>
    </div>
  </div>

  <!-- Editor Textarea -->
  <div class="flex-1 min-h-0 p-2">
    <textarea
      [(ngModel)]="script"
      (ngModelChange)="onScriptChange($event)"
      class="w-full h-full p-3 font-mono text-sm border border-[var(--border)] rounded-lg bg-[var(--bg)] focus:outline-none focus:border-[var(--crm-primary)] resize-none"
      spellcheck="false"
      placeholder="Write your Mermaid script here..."
    ></textarea>
  </div>
</div>

<!-- pmrt28.component.html -->
<div class="space-y-5 p-0.5">
  <!-- ===== HEADER ===== -->
  <div class="flex flex-wrap items-center justify-between gap-4">
    <div class="flex items-center gap-3">
      <h1 class="text-2xl font-semibold text-[var(--text-active)] flex items-center gap-2">
        <i class="bi bi-diagram-3 text-[var(--crm-primary)]"></i>
        ลำดับชั้นบทบาท
      </h1>
      <span class="text-sm text-[var(--text-muted)] bg-[var(--bg)] px-3 py-0.5 rounded-full border border-[var(--border)]">
        {{ flatRoles().length }} บทบาท
      </span>
    </div>
    <button
      (click)="goToAddRole()"
      class="inline-flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium text-white bg-[var(--crm-primary)] hover:bg-[var(--crm-primary)]/80 transition-all"
    >
      <i class="bi bi-plus-lg"></i> เพิ่มบทบาท
    </button>
  </div>

  <!-- ===== ORGANIZATIONAL CHART ===== -->
  <div class="bg-[var(--sidebar)] rounded-xl border border-[var(--border)] p-4 shadow-sm">
    <sic-organizational-chart
      [root]="treeData()"
      (nodeAdded)="onNodeAdded($event)"
      (nodeRemoved)="onNodeRemoved($event)"
      (nodeUpdated)="onNodeUpdated($event)"
      (dataChanged)="onDataChanged($event)"
    >
    </sic-organizational-chart>
  </div>
</div>

<!-- src/app/feature/pm/rt/pmrt01A/pmrt01A.component.html -->

@if (formCustomerData; as data) {
  <form [formGroup]="data.formGroup" (ngSubmit)="submit()">
    <div class="grid grid-cols-6 gap-4">
      <!-- HEADER -->
      <div class="col-span-6 text-center">
        <h2 class="text-4xl font-semibold text-[var(--text-active)]">
          {{ isEdit ? 'แก้ไขข้อมูลลูกค้า' : 'เพิ่มข้อมูลลูกค้า' }}
        </h2>
      </div>

      <!-- Profile Picture -->
      <div
        class="col-span-11 col-start-1 md:col-span-4 md:col-start-2 lg:col-span-2 lg:col-start-3"
      >
        <sic-profile
          [size]="150"
          [visibility]="4"
          formControlName="uploadGroupData"
          [src]="profileImageUrl"
        >
        </sic-profile>
        <p class="text-center text-xs text-[var(--text-muted)] mt-2">คลิกเพื่ออัปโหลดรูปโปรไฟล์</p>
      </div>

      <!-- Customer Code -->
      <div
        class="col-span-11 col-start-1 md:col-span-4 md:col-start-2 lg:col-span-2 lg:col-start-3"
      >
        <sic-input
          label="รหัสลูกค้า"
          formControlName="customerCode"
          [required]="true"
          [errorMessages]="{
            required: 'กรุณากรอกรหัสลูกค้า',
            maxlength: 'รหัสลูกค้าต้องไม่เกิน 30 ตัวอักษร',
          }"
        ></sic-input>
      </div>

      <!-- Tax ID -->
      <div
        class="col-span-11 col-start-1 md:col-span-4 md:col-start-2 lg:col-span-2 lg:col-start-3"
      >
        <sic-input
          label="เลขประจำตัวผู้เสียภาษี"
          [mask]="'0-0000-00000-00-0'"
          formControlName="taxId"
        ></sic-input>
      </div>

      <!-- Company Name (English) -->
      <div
        class="col-span-11 col-start-1 md:col-span-4 md:col-start-2 lg:col-span-2 lg:col-start-3"
      >
        <sic-input
          label="ชื่อบริษัท (อังกฤษ)"
          formControlName="companyNameEn"
          [required]="true"
          [errorMessages]="{
            required: 'กรุณากรอกชื่อบริษัท (อังกฤษ)',
            maxlength: 'ชื่อบริษัทต้องไม่เกิน 255 ตัวอักษร',
          }"
        ></sic-input>
      </div>

      <!-- Company Name (Local) -->
      <div
        class="col-span-11 col-start-1 md:col-span-4 md:col-start-2 lg:col-span-2 lg:col-start-3"
      >
        <sic-input
          label="ชื่อบริษัท (ไทย)"
          formControlName="companyNameLocal"
          [required]="true"
          [errorMessages]="{
            required: 'กรุณากรอกชื่อบริษัท (ไทย)',
            maxlength: 'ชื่อบริษัทต้องไม่เกิน 255 ตัวอักษร',
          }"
        ></sic-input>
      </div>

      <!-- Contact Person -->
      <div
        class="col-span-11 col-start-1 md:col-span-4 md:col-start-2 lg:col-span-2 lg:col-start-3"
      >
        <sic-input label="ผู้ติดต่อ" formControlName="contactPerson"></sic-input>
      </div>

      <!-- Country -->
      <div
        class="col-span-11 col-start-1 md:col-span-4 md:col-start-2 lg:col-span-2 lg:col-start-3"
      >
        <sic-combobox
          label="ประเทศ"
          formControlName="countryId"
          [apiUrl]="service.apiGetComboboxCountry"
          (selectionChanged)="onCountryChange($event)"
        >
        </sic-combobox>
      </div>

      <!-- Address (English) -->
      <div
        class="col-span-11 col-start-1 md:col-span-4 md:col-start-2 lg:col-span-2 lg:col-start-3"
      >
        <sic-input-area
          label="ที่อยู่ (อังกฤษ)"
          formControlName="addressEn"
          [rows]="2"
        ></sic-input-area>
      </div>

      <!-- Address (Local) -->
      <div
        class="col-span-11 col-start-1 md:col-span-4 md:col-start-2 lg:col-span-2 lg:col-start-3"
      >
        <sic-input-area
          label="ที่อยู่ (ไทย)"
          formControlName="addressLocal"
          [rows]="2"
        ></sic-input-area>
      </div>

      <!-- Province / District / Sub-District -->
      <div
        class="col-span-11 col-start-1 md:col-span-4 md:col-start-2 lg:col-span-2 lg:col-start-3"
      >
        <sic-combobox
          label="จังหวัด"
          formControlName="provinceId"
          [apiUrl]="service.apiGetComboboxProvince"
          [params]="{ countryId: data.formGroup.get('countryId')?.value }"
          (selectionChanged)="onProvinceChange($event)"
        >
        </sic-combobox>
      </div>
      <div
        class="col-span-11 col-start-1 md:col-span-4 md:col-start-2 lg:col-span-2 lg:col-start-3"
      >
        <sic-combobox
          label="อำเภอ"
          formControlName="districtId"
          [apiUrl]="service.apiGetComboboxDistrict"
          [params]="{ provinceId: data.formGroup.get('provinceId')?.value }"
          (selectionChanged)="onDistrictChange($event)"
        >
        </sic-combobox>
      </div>
      <div
        class="col-span-11 col-start-1 md:col-span-4 md:col-start-2 lg:col-span-2 lg:col-start-3"
      >
        <sic-combobox
          label="ตำบล"
          formControlName="subDistrictId"
          [apiUrl]="service.apiGetComboboxSubDistrict"
          [params]="{ districtId: data.formGroup.get('districtId')?.value }"
          (selectionChanged)="onSubDistrictChange($event)"
        >
        </sic-combobox>
      </div>

      <!-- Zip Code -->
      <div
        class="col-span-11 col-start-1 md:col-span-4 md:col-start-2 lg:col-span-2 lg:col-start-3"
      >
        <sic-input label="รหัสไปรษณีย์" formControlName="zipCode"></sic-input>
      </div>

      <!-- Email -->
      <div
        class="col-span-11 col-start-1 md:col-span-4 md:col-start-2 lg:col-span-2 lg:col-start-3"
      >
        <sic-input
          label="อีเมล"
          formControlName="email"
          [errorMessages]="{
            email: 'กรุณากรอกอีเมลให้ถูกต้อง',
            maxlength: 'อีเมลต้องไม่เกิน 320 ตัวอักษร',
          }"
        ></sic-input>
      </div>

      <!-- Phone Number -->
      <div
        class="col-span-11 col-start-1 md:col-span-4 md:col-start-2 lg:col-span-2 lg:col-start-3"
      >
        <sic-input-phone label="เบอร์โทรศัพท์" formControlName="phoneNumber"></sic-input-phone>
      </div>

      <!-- Line ID -->
      <div
        class="col-span-11 col-start-1 md:col-span-4 md:col-start-2 lg:col-span-2 lg:col-start-3"
      >
        <sic-input label="Line ID" formControlName="lineId"></sic-input>
      </div>

      <!-- Remark -->
      <div
        class="col-span-11 col-start-1 md:col-span-4 md:col-start-2 lg:col-span-2 lg:col-start-3"
      >
        <sic-input-area label="หมายเหตุ" formControlName="remark" [rows]="2"></sic-input-area>
      </div>

      <!-- Active Status -->
      <div
        class="col-span-11 col-start-1 md:col-span-4 md:col-start-2 lg:col-span-2 lg:col-start-3"
      >
        <label class="flex items-center gap-2 cursor-pointer text-sm">
          <input
            type="checkbox"
            formControlName="isActive"
            class="w-4 h-4 text-[var(--crm-primary)] focus:ring-[var(--crm-primary)]/20 rounded"
          />
          <span class="text-[var(--text-active)]">เปิดใช้งาน</span>
        </label>
      </div>

      <!-- Buttons -->
      <div
        class="col-span-11 col-start-1 md:col-span-4 md:col-start-2 lg:col-span-2 lg:col-start-3 flex gap-6 mt-5"
      >
        <div class="flex-1">
          <sic-button [fullWidth]="true" [type]="'button'" variant="secondary" (click)="onBack()">
            <i class="bi bi-arrow-left"></i> ย้อนกลับ
          </sic-button>
        </div>
        <div class="flex-1">
          <sic-button [fullWidth]="true" [type]="'submit'" variant="primary">
            <i class="bi bi-floppy"></i>
            {{ isEdit ? 'บันทึก' : 'สร้าง' }}
          </sic-button>
        </div>
      </div>
    </div>
  </form>
}

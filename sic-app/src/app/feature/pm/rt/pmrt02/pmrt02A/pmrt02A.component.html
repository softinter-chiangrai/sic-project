<!-- src/app/feature/pm/rt/pmrt02/pmrt02A/pmrt02A.component.html -->
@if (form) {
  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="grid grid-cols-6 gap-4">
      
      <!-- HEADER -->
      <div class="col-span-6 text-center">
        <h2 class="text-4xl font-semibold text-[var(--text-active)]">
          {{ isEdit ? 'แก้ไขข้อมูลโครงการ' : 'เพิ่มข้อมูลโครงการ' }}
        </h2>
      </div>

      <!-- Project Code -->
      <div class="col-span-11 col-start-1 md:col-span-4 md:col-start-2 lg:col-span-2 lg:col-start-3">
        <sic-input
          label="รหัสโครงการ"
          formControlName="projectCode"
          [required]="true"
          placeholder="เช่น PRJ-2024-001"
        ></sic-input>
      </div>

      <!-- Project Name -->
      <div class="col-span-11 col-start-1 md:col-span-4 md:col-start-2 lg:col-span-2 lg:col-start-3">
        <sic-input
          label="ชื่อโครงการ"
          formControlName="projectName"
          [required]="true"
          placeholder="ระบุชื่อโครงการ"
        ></sic-input>
      </div>

      <!-- Dates -->
      <div class="col-span-11 col-start-1 md:col-span-4 md:col-start-2 lg:col-span-2 lg:col-start-3 flex gap-6">
        <div class="flex-1">
          <sic-input
            label="วันที่เริ่ม"
            type="date"
            formControlName="startDate"
            [required]="true"
          ></sic-input>
        </div>
        <div class="flex-1">
          <sic-input
            label="วันที่สิ้นสุดตามแผน"
            type="date"
            formControlName="plannedEndDate"
            [required]="true"
          ></sic-input>
        </div>
      </div>

      <!-- Actual End Date (Optional) -->
      <div class="col-span-11 col-start-1 md:col-span-4 md:col-start-2 lg:col-span-2 lg:col-start-3">
        <sic-input
          label="วันที่สิ้นสุดจริง"
          type="date"
          formControlName="actualEndDate"
        ></sic-input>
      </div>

      <!-- Mandays -->
      <div class="col-span-11 col-start-1 md:col-span-4 md:col-start-2 lg:col-span-2 lg:col-start-3 flex gap-6">
        <div class="flex-1">
          <sic-input
            label="งบประมาณ Manday"
            type="number"
            formControlName="budgetManday"
            [required]="true"
            placeholder="0"
          ></sic-input>
        </div>
        <div class="flex-1">
          <sic-input
            label="Manday ที่ใช้ไป"
            type="number"
            formControlName="usedManday"
            placeholder="0"
          ></sic-input>
        </div>
      </div>

      <!-- Status & Priority -->
      <div class="col-span-11 col-start-1 md:col-span-4 md:col-start-2 lg:col-span-2 lg:col-start-3 flex gap-6">
        <div class="flex-1">
          <sic-combobox
            label="สถานะโครงการ"
            formControlName="status"
            [apiUrl]="" 
            [options]="statusOptions.map(s => ({ value: s, text: s }))"
            [required]="true"
          ></sic-combobox>
        </div>
        <div class="flex-1">
          <sic-combobox
            label="ระดับความสำคัญ"
            formControlName="priority"
            [apiUrl]=""
            [options]="priorityOptions.map(p => ({ value: p, text: p }))"
            [required]="true"
          ></sic-combobox>
        </div>
      </div>

      <!-- Description -->
      <div class="col-span-11 col-start-1 md:col-span-4 md:col-start-2 lg:col-span-2 lg:col-start-3">
        <sic-input-area
          label="รายละเอียดเพิ่มเติม"
          formControlName="description"
          [rows]="3"
          placeholder="อธิบายขอบเขตหรือหมายเหตุ..."
        ></sic-input-area>
      </div>

      <!-- Active Status -->
      <div class="col-span-11 col-start-1 md:col-span-4 md:col-start-2 lg:col-span-2 lg:col-start-3">
        <label class="flex items-center gap-2 cursor-pointer text-sm">
          <input
            type="checkbox"
            formControlName="isActive"
            class="w-4 h-4 text-[var(--crm-primary)] focus:ring-[var(--crm-primary)]/20 rounded"
          />
          <span class="text-[var(--text-active)]">เปิดใช้งานโครงการ</span>
        </label>
      </div>

      <!-- Buttons -->
      <div class="col-span-11 col-start-1 md:col-span-4 md:col-start-2 lg:col-span-2 lg:col-start-3 flex gap-6 mt-5">
        <div class="flex-1">
          <sic-button [fullWidth]="true" [type]="'button'" variant="secondary" (click)="onBack()">
            <i class="bi bi-arrow-left"></i> ย้อนกลับ
          </sic-button>
        </div>
        <div class="flex-1">
          <sic-button [fullWidth]="true" [type]="'submit'" variant="primary">
            <i class="bi bi-floppy"></i>
            {{ isEdit ? 'บันทึก' : 'สร้าง' }}
          </sic-button>
        </div>
      </div>

    </div>
  </form>
}

<sic-container>
  <div class="space-y-4 bg-[var(--bg)] text-[var(--text)]">
    <sic-card>
      <div class="flex flex-col gap-4 lg:flex-row lg:items-end lg:justify-between">
        <div>
          <div class="flex items-center gap-3">
            <div class="grid h-11 w-11 place-items-center rounded-2xl bg-[var(--crm-primary)] text-white">
              <i class="bi bi-grid-3x3-gap text-lg"></i>
            </div>

            <div>
              <h1 class="m-0 text-xl font-semibold text-[var(--text-active)]">
                {{ title() }}
              </h1>

              <p class="mt-1 text-sm text-[var(--text-muted)]">
                Dynamic UI จาก Marketplace Schema
              </p>
            </div>
          </div>

          <div class="mt-4 flex flex-wrap gap-2 text-xs">
            <span class="rounded-full border border-[var(--border)] bg-[var(--sidebar-hover)] px-3 py-1 text-[var(--text)]">
              App ID: {{ appId }}
            </span>

            <span class="rounded-full border border-[var(--border)] bg-[var(--sidebar-hover)] px-3 py-1 text-[var(--text)]">
              Program: {{ programCode }}
            </span>

            <span
              *ngIf="schema()"
              class="rounded-full border border-[var(--border)] bg-[var(--sidebar-hover)] px-3 py-1 text-[var(--text)]">
              Entity: {{ schema()?.entity?.name }}
            </span>
          </div>
        </div>

        <div class="flex w-full flex-col gap-2 sm:flex-row lg:w-auto">
          <div class="w-full sm:w-80">
            <sic-input
              label="ค้นหาข้อมูล"
              placeholder="ค้นหา..."
              type="search"
              [(ngModel)]="keyword"
              (keyup.enter)="search()">
            </sic-input>
          </div>

          <div class="flex gap-2 sm:items-end">
            <sic-button
              variant="primary"
              [disabled]="loading()"
              (click)="search()">
              <i class="bi bi-search mr-1"></i>
              Search
            </sic-button>

            <sic-button
              variant="outline"
              [disabled]="loading()"
              (click)="clearSearch()">
              Clear
            </sic-button>

            <sic-button
              variant="outline"
              [disabled]="loading()"
              (click)="loadSchema()">
              <i class="bi bi-arrow-clockwise mr-1"></i>
              Reload
            </sic-button>
          </div>
        </div>
      </div>
    </sic-card>

    <div
      *ngIf="errorMessage()"
      class="rounded-xl border border-red-500/30 bg-red-500/10 px-4 py-3 text-sm text-red-500">
      {{ errorMessage() }}
    </div>

    <div
      *ngIf="successMessage()"
      class="rounded-xl border border-emerald-500/30 bg-emerald-500/10 px-4 py-3 text-sm text-emerald-500">
      {{ successMessage() }}
    </div>

    <sic-card *ngIf="loading()">
      <div class="flex items-center justify-center gap-3 py-8 text-sm text-[var(--text-muted)]">
        <span class="h-4 w-4 animate-spin rounded-full border-2 border-[var(--border)] border-t-[var(--crm-primary)]"></span>
        กำลังโหลด schema...
      </div>
    </sic-card>

    <sic-card *ngIf="!loading() && gridConfig()">
      <div card-header>
        <div>
          <h2 class="m-0 text-base font-semibold text-[var(--text-active)]">
            Data Grid
          </h2>
          <p class="mt-1 text-sm text-[var(--text-muted)]">
            เพิ่ม แก้ไข ลบ และบันทึกข้อมูลผ่าน sic-gridpanel
          </p>
        </div>
      </div>

      <sic-gridpanel
        [config]="gridConfig()!"
        (rowsChange)="onGridRowsChange($event)"
        (rowAction)="onGridAction($event)">
      </sic-gridpanel>
    </sic-card>

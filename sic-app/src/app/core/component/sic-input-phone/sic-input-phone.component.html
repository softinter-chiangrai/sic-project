<label class="sic-input-phone-wrapper" [class.sic-input-phone--disabled]="disabled">
  @if (label) {
    <span class="sic-input-phone__label">
      {{ label }}
      @if (isRequired) {
        <span class="sic-input-phone__required">*</span>
      }
    </span>
  }

  <div class="sic-input-phone" [class.sic-input-phone--invalid]="showError">
    <input
      class="sic-input-phone__left"
      [class.sic-input-phone__field--invalid]="showError"
      type="text"
      [value]="left"
      [placeholder]="placeholderLeft"
      [disabled]="disabled"
      [required]="isRequired"
      inputmode="text"
      pattern="\+?[0-9]{0,3}"
      autocomplete="off"
      maxlength="3"
      (input)="onLeftInput($event)"
      (keypress)="onLeftKeyPress($event)"
      (blur)="onBlur()" />

    <span class="sic-input-phone__dash">-</span>

    <input
      class="sic-input-phone__right"
      [class.sic-input-phone__field--invalid]="showError"
      type="text"
      [value]="right"
      [placeholder]="placeholderRight"
      [disabled]="disabled"
      [required]="isRequired"
      inputmode="numeric"
      pattern="[0-9]*"
      autocomplete="off"
      (input)="onRightInput($event)"
      (blur)="onBlur()" />
  </div>

  @if (showError && errorMessage) {
    <span class="sic-input-phone__error">{{ errorMessage }}</span>
  } @else if (hint) {
    <span class="sic-input-phone__hint">{{ hint }}</span>
  }
</label>

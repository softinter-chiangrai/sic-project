<label class="sic-input-area" [class.sic-input-area--invalid]="showError" [class.sic-input-area--disabled]="disabled">
  @if (label) {
    <span class="sic-input-area__label">
      {{ label }}
      @if (required) {
        <span class="sic-input-area__required">*</span>
      }
    </span>
  }

  <textarea
    class="sic-input-area__field"
    [class.sic-input-area__field--invalid]="showError"
    [value]="value"
    [placeholder]="placeholder"
    [readOnly]="readonly"
    [required]="required"
    [disabled]="disabled"
    [rows]="rows"
    [attr.minlength]="minLength"
    [attr.maxlength]="maxLength"
    (input)="handleInput($event)"
    (blur)="handleBlur()"></textarea>

  @if (showError && errorMessage) {
    <span class="sic-input-area__error">{{ errorMessage }}</span>
  } @else if (hint) {
    <span class="sic-input-area__hint">{{ hint }}</span>
  }
</label>
